<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocaLore - Master Norwegian</title>
    <style>
        :root {
            /* VocaLore App Brand Colors */
            --primary: #18354A;
            --background: #FDFCF8;
            --text-secondary: rgba(24, 53, 74, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--primary);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            background-color: var(--background);
            box-shadow: 0 20px 40px rgba(24, 53, 74, 0.08);
            border-radius: 24px;
            border: 1px solid rgba(24, 53, 74, 0.05);
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background-color: var(--primary);
            border-radius: 20px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--background);
            font-size: 2.2rem;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(24, 53, 74, 0.15);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.03em;
            color: var(--primary);
        }

        p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin: 0 0 2.5rem 0;
            line-height: 1.6;
        }

        .badges-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .store-badge {
            display: block;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .store-badge img {
            height: 56px; /* Standardized height for mobile scaling */
            width: auto;
            display: block;
        }

        .store-badge:hover {
            transform: translateY(-2px);
        }

        .store-badge:active {
            transform: translateY(1px) scale(0.98);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">V</div>
        
        <h1>VocaLore</h1>
        <p>Master Norwegian from beginner to advanced with immersive audio thrillers.</p>

        <div class="badges-container">
            <a href="https://apps.apple.com/us/app/vocalore/id6762021278" class="store-badge">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
            </a>

            <a href="https://play.google.com/store/apps/details?id=no.ck.vocalore" class="store-badge">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
            </a>
        </div>
        
        <div class="footer">
            Start training your ear today.
        </div>
    </div>

</body>
</html>
